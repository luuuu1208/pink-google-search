<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa de Imagens</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <a href="index.html">Voltar à Pesquisa Google</a>
    </div>

    <div class="main-content">
        <img src="logo-da-google-rosa.png" alt="Google Logo" width="200">

        <div class="imagens-text">
            <h2>Pesquisa de Imagens</h2>
            <p class="subtitle">Encontre imagens, fotos, ilustrações e muito mais</p>
        </div>

        <form action="https://www.google.com/search" method="GET">
            <input type="text" placeholder="Pesquisar imagens..." name="q">
            <input type="hidden" name="tbm" value="isch">

            <div class="buttons">
                <input type="submit" value="Pesquisar Imagens">
            </div>
        </form>
    </div>
</body>
</html>
