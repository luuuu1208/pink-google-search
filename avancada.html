<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa Avançada</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <a href="index.html">Voltar à Pesquisa Google</a>
    </div>

    <div class="advanced-container">
        <h1>Pesquisa Avançada</h1>
        <p class="subtitle">Encontre resultados mais precisos com filtros específicos</p>

        <form action="https://www.google.com/search" method="GET">
            <div class="form-group">
                <label for="as_q">Todas essas palavras:</label>
                <input type="text" name="as_q" id="as_q" placeholder="Ex: gatos fofos">
            </div>

            <div class="form-group">
                <label for="as_epq">Esta palavra ou frase exata:</label>
                <input type="text" name="as_epq" id="as_epq" placeholder="Ex: como cuidar de gatos">
            </div>

            <div class="form-group">
                <label for="as_oq">Qualquer uma dessas palavras:</label>
                <input type="text" name="as_oq" id="as_oq" placeholder="Ex: brincar alimentar">
            </div>

            <div class="form-group">
                <label for="as_eq">Nenhuma dessas palavras:</label>
                <input type="text" name="as_eq" id="as_eq" placeholder="Ex: doenças">
            </div>

            <div class="advanced-button">
                <input type="submit" value="Advanced Search">
            </div>
        </form>
    </div>
</body>
</html>
